name: dbt CI

on:
  push:
    branches:
      - main
    pull_request:
      branches:
        - main

jobs:
  dbt_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dbt
        run: |
          pip install dbt-core==1.8.7 dbt-snowflake==1.8.4

      - name: Debug secrets
        env:
          ORG: ${{ secrets.SNOWFLAKE_ORGANIZATION }}
          ACC: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        run: |
          echo "Org length: ${#ORG}"
          echo "Account length: ${#ACC}"
      
      - name: Run terraform plan
        working-directory: terraform
        env:
          TF_VAR_snowflake_account: ${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}
          TF_VAR_snowflake_user: ${{ secrets.SNOWFLAKE_USER }}
          TF_VAR_snowflake_password: ${{ secrets.SNOWFLAKE_PASSWORD }}
          TF_VAR_snowflake_organization: ${{ secrets.SNOWFLAKE_ORGANIZATION }}
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update && sudo apt install terraform -y
          terraform init
          terraform plan
      
      - name: Run dbt dbt_build
        working-directory: dbt_project
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_DBT_ROLE: ${{ secrets.SNOWFLAKE_DBT_ROLE }}
          SNOWFLAKE_ANALYTICS_SCHEMA: ${{ secrets.SNOWFLAKE_ANALYTICS_SCHEMA }}
          DBT_PROFILES_DIR: .
        run: |
          dbt build